<div class="login-container">

    <h1>Login to Contact Book</h1>

    <form action="/login" method="POST">

        <input
            type="text"
            name="username"
            placeholder="Username"
        >

        <br><br>

        <input
            type="password"
            name="password"
            placeholder="Password"
        >

        <br><br>

        <button type="submit">
            Login
        </button>

    </form>

    <p>
        Don't have an account?
    </p>

    <a href="/register">
        Create Account
    </a>

</div>
